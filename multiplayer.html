<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Rush Multiplayer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .unclickable-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 150px;
            height: 50px;
            background-color: transparent;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://frog-rush-multiplayer--ferutter.on.websim.com" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
        <div class="unclickable-overlay"></div>
    </div>
</body>
</html>
